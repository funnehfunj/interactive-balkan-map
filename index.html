            stroke-width: 1px;
            cursor: pointer;
            transition: fill 0.3s;
        }

        .country:hover {
            fill: #0044ff !important;
        }

        text {
            pointer-events: none;
            fill: #000;
        }

        svg {
            background-color: #f0f0f0;
            border-radius: 8px;
        }

        #popup {
            position: absolute;
            top: 50px;
            right: 50px;
            width: 300px;
            background: white;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #popup-inner {
            font-size: 14px;
            line-height: 1.4;
        }

        #popup button {
            margin-top: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

    "Bullgaria": "#b4a8d2"
};

// Draw countries
const countries = svg.selectAll("path")
    .data(geoData.features)
    .enter()
    .append("path")
    .attr("class", "country")
    .attr("fill", d => countryColors[d.properties.name] || "#ccc")
    .attr("d", path)
    .on("click", function(event, d) {
        const name = d.properties.name;

        // Set title
        d3.select("#popup-title").text(name);

        // Set content (HTML allowed)
        d3.select("#popup-content")
            .html(countryInfo[name] || "No data available");

        // Show popup
        d3.select("#popup").classed("hidden", false);

        // Optional: highlight selected country
        d3.selectAll(".country")
            .attr("stroke", "#fff")
            .attr("stroke-width", 0.5);

        d3.select(this)
            .attr("stroke", "black")
            .attr("stroke-width", 2);

        d3.select("#popup")
            .style("left", event.pageX + "px")
            .style("top", event.pageY + "px");
    });

function closePopup() {
    d3.select("#popup").classed("hidden", true);
}

        if (d.properties.name === "Greqia") return x - 210;
        return x;
    })
    .attr("y", d => {
        const [x, y] = path.centroid(d);
        if (d.properties.name === "Kroacia") return y - 105;
        return y;
    })
    .attr("text-anchor", "middle")
    .attr("font-size", "10px")
    .attr("font-weight", "bold")
    .text(d => d.properties.name);
